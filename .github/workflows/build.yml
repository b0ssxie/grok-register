name: Build GUI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build single-file GUI
        run: pyinstaller --onefile --windowed --name GrokRegister --hidden-import cpa_xai --hidden-import cpa_xai.mint --hidden-import cpa_xai.browser_session --hidden-import cpa_xai.browser_confirm --hidden-import cpa_xai.oauth_device --hidden-import cpa_xai.proxyutil --hidden-import cpa_xai.writer --hidden-import cpa_xai.schema grok_register_ttk.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GrokRegister.exe
          generate_release_notes: true
